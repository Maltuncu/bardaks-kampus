<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>bardak's kampüs</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Caveat:wght@500;600&display=swap" rel="stylesheet">
<style>
:root{--ana:#2456A0;--ana-koyu:#183F78;--acik:#EBF0FA;--gri:#FAF4E3;--kart:#FFFEF8;--metin:#1F3354;--soluk:#8189A0;--hata:#B3402F;--uyari:#C77B2B;--ok:#2E7D4F;--cizgi:#E7DEC8}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Nunito',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--gri);color:var(--metin);font-size:15px;padding-bottom:70px}
.gizli{display:none!important}
/* GİRİŞ */
#girisEkran{max-width:380px;margin:7vh auto;padding:24px}
.logoDaire{width:180px;height:180px;border:2.5px solid var(--ana);border-radius:50%;margin:0 auto 8px;display:flex;flex-direction:column;align-items:center;justify-content:center;background:transparent}
.logoYazi{font-weight:900;font-size:34px;color:var(--ana);letter-spacing:-1px;line-height:1}
.logoAltCizgi{width:110px;height:2.5px;background:var(--ana);margin:7px 0 6px}
.logoScript{font-family:'Caveat',cursive;color:var(--ana);font-size:17px;font-weight:600}
#girisEkran .alt{text-align:center;color:var(--ana);opacity:.75;margin:10px 0 24px;font-size:12px;font-weight:800;letter-spacing:3px}
.susSvg{display:block;margin:18px auto 0;opacity:.85}
/* GENEL */
.kart{background:var(--kart);border:1.5px solid var(--cizgi);border-radius:14px;padding:16px;margin-bottom:12px}
.kbaslik{font-weight:700;margin-bottom:10px;font-size:15px}
label{display:block;font-size:12.5px;color:var(--soluk);font-weight:700;margin:10px 0 4px}
input,select,textarea{width:100%;padding:11px 12px;border:1.5px solid var(--cizgi);border-radius:9px;font-size:15px;background:#fff;color:var(--metin);font-family:inherit}
input:focus,select:focus,textarea:focus{outline:2px solid var(--ana);border-color:var(--ana)}
button{cursor:pointer;font-size:15px;border:none;border-radius:9px;font-weight:800;font-family:inherit}
.btn{width:100%;padding:13px;background:var(--ana);color:#fff;margin-top:14px}
.btn:disabled{background:#9AAECE;cursor:wait}
.btn2{padding:8px 14px;background:var(--acik);color:var(--ana);font-size:13px}
.btn-kirmizi{padding:8px 14px;background:#fdeceb;color:var(--hata);font-size:13px}
.hata-msg{background:#fdeceb;color:var(--hata);padding:10px 12px;border-radius:8px;margin-top:10px;font-size:13.5px;display:none}
.ok-msg{background:#eafaf1;color:var(--ok);padding:10px 12px;border-radius:8px;margin-top:10px;font-size:13.5px;display:none}
.satir{display:flex;gap:8px}.satir>*{flex:1}
.rozet{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11.5px;font-weight:700}
.rz-uyari{background:#F8EEDD;color:var(--uyari)}.rz-ok{background:#E5F2E9;color:var(--ok)}.rz-hata{background:#F9E7E3;color:var(--hata)}.rz-gri{background:var(--acik);color:var(--ana)}
/* ÜST BAR */
#ustBar{background:var(--kart);color:var(--ana);padding:11px 16px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:50;border-bottom:1.5px solid var(--cizgi)}
#ustBar .ad{font-weight:900;font-size:18px;letter-spacing:-0.5px;line-height:1.1}
#ustBar .ad .kmp{font-family:'Caveat',cursive;font-weight:600;font-size:15px;letter-spacing:0;margin-left:4px}
#ustBar .kim{font-size:11.5px;color:var(--soluk);font-weight:600}
#cikisBtn{background:var(--acik);color:var(--ana);padding:7px 12px;font-size:12.5px}
/* SEKMELER */
#sekmeBar{position:fixed;bottom:0;left:0;right:0;background:var(--kart);border-top:1.5px solid var(--cizgi);display:flex;z-index:50;overflow-x:auto}
#sekmeBar button{flex:1;min-width:62px;padding:8px 2px 7px;background:none;color:var(--soluk);font-size:10.5px;font-weight:700;display:flex;flex-direction:column;align-items:center;gap:3px;border-top:2.5px solid transparent;position:relative}
.tbadge{position:absolute;top:3px;right:8px;background:var(--hata);color:#fff;border-radius:10px;font-size:9.5px;padding:1px 5px;font-weight:800;line-height:1.4}
#sekmeBar button.aktif{color:var(--ana);border-top-color:var(--ana)}
#sekmeBar .iko{width:21px;height:21px}
#sekmeBar .iko svg{width:100%;height:100%}
main{padding:14px;max-width:640px;margin:0 auto}
/* LİSTE */
.liste-satir{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #F2ECD9;font-size:14px;gap:8px}
.liste-satir:last-child{border-bottom:none}
.l-sol .b{font-weight:700}.l-sol .k{font-size:12px;color:var(--soluk)}
.l-sag{text-align:right;font-weight:800;white-space:nowrap}
.ozet-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.ozet-kut{background:var(--kart);border:1.5px solid var(--cizgi);border-radius:14px;padding:14px}
.ozet-kut .e{font-size:11px;color:var(--soluk);font-weight:800;letter-spacing:.5px}
.ozet-kut .d{font-size:19px;font-weight:900;margin-top:3px;color:var(--ana)}
.kdv-satir{display:flex;gap:6px;margin-bottom:6px;align-items:center}
.kdv-satir select{width:82px;flex:none}
.kdv-satir .sil{background:#fdeceb;color:var(--hata);padding:9px 11px;flex:none}
.kalem-satir{display:flex;gap:6px;margin-bottom:6px;align-items:center}
.kalem-satir .sil{background:#fdeceb;color:var(--hata);padding:9px 11px;flex:none}
.bilgi-not{font-size:12.5px;color:var(--soluk);background:var(--acik);padding:8px 10px;border-radius:8px;margin-top:8px}
h2.bolum{font-size:17px;font-weight:900;margin:4px 0 12px;color:var(--ana-koyu)}
.foto-onizle{max-width:80px;max-height:80px;border-radius:8px;border:1px solid var(--cizgi);margin-top:6px}
</style>
</head>
<body>

<!-- ================= GİRİŞ ================= -->
<div id="girisEkran">
  <div class="logoDaire">
    <div class="logoYazi">bardak's</div>
    <div class="logoAltCizgi"></div>
    <div class="logoScript">"iz bırakan tatlar"</div>
  </div>
  <div class="alt">KAMPÜS PANELİ</div>
  <div class="kart">
    <label>E-posta</label>
    <input type="email" id="girisEmail" autocomplete="username" inputmode="email">
    <label>Şifre</label>
    <input type="password" id="girisSifre" autocomplete="current-password">
    <button class="btn" id="girisBtn" onclick="girisYap()">Giriş Yap</button>
    <div class="hata-msg" id="girisHata"></div>
    <div style="text-align:center;margin-top:14px">
      <a href="#" onclick="sifremiUnuttum();return false" style="color:var(--ana);font-size:13px;font-weight:700">Şifremi unuttum</a>
    </div>
    <div class="bilgi-not" style="text-align:center">Bir kez giriş yapınca cihaz sizi hatırlar — her seferinde şifre gerekmez.</div>
  </div>
  <svg class="susSvg" width="72" height="82" viewBox="0 0 72 82" fill="none" stroke="#2456A0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M14 22l3-9c.2-.7 1-1.3 1.8-1.3l34.4-1.5c.9 0 1.7.6 1.9 1.4L58 22"/>
    <path d="M11 22h50v5H11z"/>
    <path d="M13 27l4.5 50c.1.9.9 1.7 1.8 1.7h33.4c.9 0 1.7-.8 1.8-1.7L59 27"/>
    <path d="M15 38h42M17.5 62h37"/>
    <g transform="rotate(-22 30 50)"><ellipse cx="30" cy="50" rx="3.6" ry="5.2"/><path d="M30 45.5c-1.2 1.5-1.2 7.5 0 9"/></g>
    <g transform="rotate(18 42 51)"><ellipse cx="42" cy="51" rx="3.6" ry="5.2"/><path d="M42 46.5c1.2 1.5 1.2 7.5 0 9"/></g>
  </svg>
</div>

<!-- ================= UYGULAMA ================= -->
<div id="uygulama" class="gizli">
  <div id="ustBar">
    <div><div class="ad">bardak's<span class="kmp">kampüs</span></div><div class="kim" id="kimBilgi"></div></div>
    <div style="display:flex;gap:6px">
      <button id="sifreBtn" onclick="sifreDegistir()" style="background:var(--acik);color:var(--ana);padding:7px 12px;font-size:12.5px">Şifre</button>
      <button id="cikisBtn" onclick="cikisYap()">Çıkış</button>
    </div>
  </div>
  <main id="icerik"></main>
  <nav id="sekmeBar"></nav>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js"></script>
<script>
/* ================== AYAR ================== */
const SB_URL = 'https://gbheqnxmwvabwuimzskv.supabase.co';
const SB_KEY = 'sb_publishable_qtiCjExLIte6WJcbdB5jNg_fUJDYnxF';
const sb = supabase.createClient(SB_URL, SB_KEY);

let PROFIL = null;   // {id, ad, rol, sube_id}
let KATALOG = { kategoriler: [], tedarikciler: [], urunler: [] };
let AKTIF_SEKME = null;

const bugun = () => new Date().toISOString().slice(0,10);
const tl = n => (Number(n)||0).toLocaleString('tr-TR',{minimumFractionDigits:2,maximumFractionDigits:2}) + ' TL';
const esc = s => String(s??'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const idem = () => crypto.randomUUID();

/* ================== GİRİŞ / OTURUM ================== */
async function girisYap(){
  const btn = document.getElementById('girisBtn'), h = document.getElementById('girisHata');
  h.style.display='none'; btn.disabled=true; btn.textContent='Giriş yapılıyor...';
  const { error } = await sb.auth.signInWithPassword({
    email: document.getElementById('girisEmail').value.trim(),
    password: document.getElementById('girisSifre').value
  });
  btn.disabled=false; btn.textContent='Giriş Yap';
  if (error){ h.textContent = 'Giriş başarısız: e-posta veya şifre hatalı.'; h.style.display='block'; return; }
  await baslat();
}
async function cikisYap(){ await sb.auth.signOut(); location.reload(); }

async function sifreDegistir(){
  const y1 = prompt('Yeni şifre (en az 8 karakter):');
  if (y1 === null) return;
  if (y1.length < 8){ alert('Şifre en az 8 karakter olmalı.'); return; }
  const y2 = prompt('Yeni şifreyi TEKRAR yazın:');
  if (y2 === null) return;
  if (y1 !== y2){ alert('İki şifre aynı değil, değişiklik yapılmadı.'); return; }
  const { error } = await sb.auth.updateUser({ password: y1 });
  alert(error ? ('Şifre değiştirilemedi: ' + error.message) : 'Şifreniz değiştirildi ✓ Yeni girişlerde yeni şifreyi kullanın.');
}

async function sifremiUnuttum(){
  const email = document.getElementById('girisEmail').value.trim() || prompt('E-posta adresiniz:');
  if (!email) return;
  const { error } = await sb.auth.resetPasswordForEmail(email, { redirectTo: location.origin + location.pathname });
  alert(error ? ('Gönderilemedi: ' + error.message)
    : 'Şifre sıfırlama bağlantısı e-postanıza gönderildi. Maildeki linke tıklayın — uygulamaya dönünce yeni şifrenizi belirleyeceksiniz.');
}
// Sıfırlama mailindeki linkle dönüldüğünde yeni şifre iste
sb.auth.onAuthStateChange((event)=>{ if (event === 'PASSWORD_RECOVERY') setTimeout(sifreDegistir, 400); });

async function baslat(){
  const { data:{ session } } = await sb.auth.getSession();
  if (!session){ document.getElementById('girisEkran').classList.remove('gizli'); return; }
  const { data: p, error } = await sb.from('profil').select('*').eq('id', session.user.id).single();
  if (error || !p || !p.aktif){
    alert('Hesabınız sisteme tanımlı değil. Yöneticiyle görüşün.');
    await sb.auth.signOut(); location.reload(); return;
  }
  PROFIL = p;
  document.getElementById('girisEkran').classList.add('gizli');
  document.getElementById('uygulama').classList.remove('gizli');
  document.getElementById('kimBilgi').textContent = p.ad + ' · ' + (p.rol==='owner'?'Yönetici':'Personel');
  await katalogYukle();
  sekmeleriKur();
  sekmeAc(PROFIL.rol==='owner' ? 'ozet' : 'gunsonu');
}

async function katalogYukle(){
  const [k, t, u] = await Promise.all([
    sb.from('gider_kategori').select('id,ad').eq('aktif',true).eq('is_deleted',false).order('ad'),
    sb.from('tedarikci').select('id,ad,unvan,vergi_no,vergi_dairesi,yetkili_ad,telefon,telefon2,email,adres').eq('aktif',true).eq('is_deleted',false).order('ad'),
    sb.from('urun').select('id,ad,birim').eq('aktif',true).eq('is_deleted',false).order('ad')
  ]);
  KATALOG.kategoriler = k.data||[]; KATALOG.tedarikciler = t.data||[]; KATALOG.urunler = u.data||[];
}

/* ================== SEKMELER ================== */
const _svg = ic => `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">${ic}</svg>`;
const IKON = {
  ozet:    _svg('<path d="M4 20V11M10 20V4M16 20v-6M21 20H3"/>'),
  gunsonu: _svg('<path d="M6 3h12v18l-2-1.6L14 21l-2-1.6L10 21l-2-1.6L6 21zM9 8h6M9 12h6M9 16h3"/>'),
  gider:   _svg('<rect x="2.5" y="6.5" width="19" height="11" rx="1.5"/><circle cx="12" cy="12" r="2.6"/><path d="M6 10v4M18 10v4"/>'),
  alis:    _svg('<path d="M12 3l8.5 4.7v8.6L12 21l-8.5-4.7V7.7z"/><path d="M3.5 7.7L12 12.4l8.5-4.7M12 12.4V21"/>'),
  stok:    _svg('<rect x="5" y="4.5" width="14" height="17" rx="1.5"/><path d="M9 4.5V3h6v1.5M9 10h6M9 14h6M9 18h3"/>'),
  tedarikci:_svg('<path d="M2.5 6h11v10h-11zM13.5 9.5H18l3 3.5v3h-7.5"/><circle cx="7" cy="17.5" r="1.8"/><circle cx="17" cy="17.5" r="1.8"/>'),
  personel:_svg('<circle cx="12" cy="8" r="3.5"/><path d="M5 20c0-3.5 3-6 7-6s7 2.5 7 6"/>'),
  talep:   _svg('<path d="M12 4a5.5 5.5 0 0 1 5.5 5.5c0 5 2 6 2 6h-15s2-1 2-6A5.5 5.5 0 0 1 12 4zM10 19a2.2 2.2 0 0 0 4 0"/>'),
  yonetim: _svg('<path d="M4 7h10M18 7h2M4 12h2M10 12h10M4 17h10M18 17h2"/><circle cx="16" cy="7" r="2"/><circle cx="8" cy="12" r="2"/><circle cx="16" cy="17" r="2"/>')
};
const SEKMELER_OWNER = [
  {id:'ozet',    ad:'Özet'},
  {id:'gunsonu', ad:'Gün Sonu'},
  {id:'gider',   ad:'Giderler'},
  {id:'stok',    ad:'Stok'},
  {id:'tedarikci',ad:'Tedarikçi'},
  {id:'personel',ad:'Personel'},
  {id:'talep',   ad:'Yapılacaklar'},
  {id:'yonetim', ad:'Yönetim'}
];
const SEKMELER_PERSONEL = [
  {id:'gunsonu', ad:'Gün Sonu'},
  {id:'gider',   ad:'Giderler'},
  {id:'stok',    ad:'Stok'},
  {id:'tedarikci',ad:'Tedarikçi'},
  {id:'talep',   ad:'Yapılacaklar'}
];
function sekmeleriKur(){
  const liste = PROFIL.rol==='owner' ? SEKMELER_OWNER : SEKMELER_PERSONEL;
  document.getElementById('sekmeBar').innerHTML = liste.map(s =>
    `<button id="sk_${s.id}" onclick="sekmeAc('${s.id}')"><span class="iko">${IKON[s.id]}</span>${s.ad}</button>`).join('');
  talepRozet();
}
async function talepRozet(){
  // Bekleyen madde sayısı Yapılacaklar sekmesinde rozet (herkese)
  try{
    const { count } = await sb.from('duzeltme_talebi')
      .select('id', { count:'exact', head:true }).eq('durum','acik').eq('is_deleted',false);
    const sk = document.getElementById('sk_talep');
    if (!sk) return;
    const eski = sk.querySelector('.tbadge'); if (eski) eski.remove();
    if (count > 0) sk.insertAdjacentHTML('beforeend', `<span class="tbadge">${count}</span>`);
  }catch(e){}
}
function sekmeAc(id){
  AKTIF_SEKME = id;
  document.querySelectorAll('#sekmeBar button').forEach(b=>b.classList.remove('aktif'));
  const sk = document.getElementById('sk_'+id); if (sk) sk.classList.add('aktif');
  ({ozet:vOzet, gunsonu:vGunSonu, gider:vGider, stok:vStok, tedarikci:vTedarikci, personel:vPersonel, talep:vTalep, yonetim:vYonetim})[id]();
}

/* ================== YARDIMCILAR ================== */
function mesaj(elId, tip, txt){
  const el = document.getElementById(elId); if(!el) return;
  el.className = tip==='ok' ? 'ok-msg' : 'hata-msg';
  el.textContent = txt; el.style.display='block';
  if (tip==='ok') setTimeout(()=>{ el.style.display='none'; }, 5000);
}
async function fotoKucult(file){
  // Telefon fotoğrafları 5-10MB olabiliyor: yüklemeden önce ~1600px JPEG'e küçült.
  try{
    const img = await createImageBitmap(file);
    const max = 1600;
    const oran = Math.min(1, max / Math.max(img.width, img.height));
    if (oran === 1 && file.size < 700*1024) return { veri:file, tip:null };
    const c = document.createElement('canvas');
    c.width = Math.round(img.width*oran); c.height = Math.round(img.height*oran);
    c.getContext('2d').drawImage(img, 0, 0, c.width, c.height);
    const blob = await new Promise(r=>c.toBlob(r,'image/jpeg',0.82));
    return blob ? { veri:blob, tip:'jpg' } : { veri:file, tip:null };
  }catch(e){ return { veri:file, tip:null }; } // küçültülemezse orijinali yükle
}
async function fotoYukle(inputId, klasor){
  const inp = document.getElementById(inputId);
  if (!inp || !inp.files || !inp.files[0]) return null;
  const f = inp.files[0];
  const k = await fotoKucult(f);
  const uzanti = k.tip || (f.name.split('.').pop()||'jpg').toLowerCase();
  const yol = `${klasor}/${bugun()}_${crypto.randomUUID()}.${uzanti}`;
  const { error } = await sb.storage.from('belgeler').upload(yol, k.veri, { upsert:false, contentType: k.tip ? 'image/jpeg' : (f.type||undefined) });
  if (error) throw new Error('Fotoğraf yüklenemedi: ' + error.message);
  return yol;
}
async function rpcCagir(fn, params, btnId, msgId, basariTxt){
  const btn = document.getElementById(btnId);
  btn.disabled = true; const eski = btn.textContent; btn.textContent = 'Kaydediliyor...';
  try{
    // Aynı idem anahtarıyla otomatik 2 deneme: bağlantı koparsa (commit olmuş olabilir)
    // aynı anahtar _idem_kontrol'e takılır, mükerrer kayıt OLMAZ.
    let son;
    for (let deneme = 0; deneme < 2; deneme++){
      son = await sb.rpc(fn, params);
      if (!son.error) break;
      if (!/Failed to fetch|NetworkError|timeout/i.test(son.error.message)) break; // sadece ağ hatasında retry
      btn.textContent = 'Bağlantı koptu, tekrar deneniyor...';
      await new Promise(r=>setTimeout(r, 1200));
    }
    if (son.error) throw new Error(hataTr(son.error.message));
    mesaj(msgId, 'ok', basariTxt);
    return son.data;
  }catch(e){
    mesaj(msgId, 'hata', e.message + ' — Verileriniz formda duruyor, tekrar deneyin.');
    return null;
  }finally{
    btn.disabled = false; btn.textContent = eski;
  }
}
function hataTr(m){
  if (m.includes('GUN_ZATEN_GIRILMIS')) return 'Bu günün kaydı zaten girilmiş. Düzeltme gerekiyorsa talep açın.';
  if (m.includes('AY_KAPALI')) return 'Bu ay kapatılmış — geçmişe kayıt için yöneticiye başvurun.';
  if (m.includes('YETKI_YOK')) return 'Bu işlem için yetkiniz yok.';
  if (m.includes('SUBE_UYUSMUYOR')) return 'Şube uyuşmazlığı.';
  if (m.includes('NEDEN_ZORUNLU')) return 'Neden yazmak zorunlu.';
  if (m.includes('ux_alis_belge') || m.includes('duplicate key')) return 'Bu belge numarası bu firma için zaten girilmiş — mükerrer fatura engellendi.';
  if (m.includes('SADECE_KENDI')) return 'Sadece kendi girdiğiniz kaydı düzeltebilirsiniz.';
  if (m.includes('SURE_GECTI')) return 'Düzeltme süresi (12 saat) geçmiş — yöneticiye başvurun.';
  if (m.includes('Failed to fetch')) return 'İnternet bağlantısı sorunu.';
  return m;
}
function tarihSecici(id, deger){

        <div class="k" style="font-size:12px;color:var(--soluk)">${g?(()=>{const ks=g.kasa_nakit===null?null:+g.kasa_nakit; return ks!==null?('Gerçek '+tl(+g.kart_toplam+ks+kasadanBugun)+' · Z-dışı +'+tl(ks+kasadanBugun-g.nakit_toplam)):('Kart '+tl(g.kart_toplam)+' · Nakit '+tl(g.nakit_toplam));})():'Gün sonu girilmedi'}</div></div>
      <div class="ozet-kut"><div class="e">AY CİROSU (${o?o.gun_sayisi:0} gün)</div><div class="d">${o?tl(o.ciro):'—'}</div>
        <div class="k" style="font-size:12px;color:var(--soluk)">${kasaVeriVar?('Gerçek '+tl(ayGercek)+' · Z-dışı +'+tl(ayZdisi)):''}</div></div>
      <div class="ozet-kut"><div class="e">AY KDV TAHMİNİ</div><div class="d">${k?tl(k.odenecek_kdv_tahmini):'—'}</div>
        <div style="font-size:12px;color:var(--soluk)">${k?('Satış '+tl(k.satis_kdv)+' − İnd. '+tl(k.indirilecek_kdv)):''}</div></div>
      <div class="ozet-kut"><div class="e">AY BRÜT KÂR TAHMİNİ</div><div class="d">${o?tl(o.brut_kar_tahmini):'—'}</div></div>
    </div>
    <div class="kart"><div class="kbaslik" style="color:var(--ana)">Uyarılar (${u.length})</div>
      ${u.length===0?'<div class="bilgi-not">Uyarı yok.</div>':u.map(x=>`
        <div class="liste-satir"><div class="l-sol"><span class="rozet ${x.tip==='stok'||x.tip==='talep'||x.tip==='fatura'||x.tip==='cek'?'rz-hata':'rz-uyari'}">${({vade:'VADE',stok:'STOK',talep:'TALEP',eksik_gun:'EKSİK GÜN',fatura:'FATURA',cek:'ÇEK'})[x.tip]||'UYARI'}</span> ${esc(x.mesaj)}</div></div>`).join('')}
    </div>

      <div class="liste-satir"><div>Net satış (KDV hariç)</div><div class="l-sag">${tl(o.net_satis_kdv_haric)}</div></div>
      <div class="liste-satir"><div>Mal alışları</div><div class="l-sag">−${tl(o.alis_toplam)}</div></div>
      <div class="liste-satir"><div>Giderler</div><div class="l-sag">−${tl(o.gider_toplam)}</div></div>

    </div>`:''}`;

let KDV_SAYAC = 0;
function kdvSatirEkle(oran, satis, kdv, sabit){
  KDV_SAYAC++;
  const n = KDV_SAYAC;
  const div = document.createElement('div');
  div.className='kdv-satir'; div.id='kdvS_'+n;
  const oranKutu = sabit
    ? `<span style="width:82px;flex:none;text-align:center;font-weight:800;color:var(--ana);padding:11px 0">%${oran||10}</span><input type="hidden" id="kdvO_${n}" value="${oran||10}">`
    : `<select id="kdvO_${n}"><option value="1"${oran==1?' selected':''}>%1</option><option value="10"${(oran==10||!oran)?' selected':''}>%10</option><option value="20"${oran==20?' selected':''}>%20</option></select>`;
  div.innerHTML = `
    ${oranKutu}
    <input type="number" step="0.01" inputmode="decimal" id="kdvT_${n}" placeholder="Z'deki %${oran||10} TOPLAM" value="${satis||''}">
    <input type="number" step="0.01" inputmode="decimal" id="kdvV_${n}" placeholder="KDV (sistem hesaplar)" value="${kdv||''}">
    ${sabit?'':`<button class="sil" onclick="document.getElementById('kdvS_${n}').remove()">✕</button>`}`;
  document.getElementById('kdvSatirlari').appendChild(div);
  // Oran toplam satış yazılınca KDV'yi sistem hesaplar (Z'deki TOPKDV farklıysa üzerine yazılabilir)
  const hesapla = () => {
    const t = +document.getElementById('kdvT_'+n).value || 0;
    const o = +document.getElementById('kdvO_'+n).value || 0;
    document.getElementById('kdvV_'+n).value = t > 0 ? (t - t/(1+o/100)).toFixed(2) : '';
  };
  document.getElementById('kdvT_'+n).addEventListener('input', hesapla);
  const oranEl = document.getElementById('kdvO_'+n);
  if (oranEl.tagName === 'SELECT') oranEl.addEventListener('change', hesapla);
}
function kdvOku(){
  const sonuc = [];
  document.querySelectorAll('#kdvSatirlari .kdv-satir').forEach(d=>{
    const n = d.id.split('_')[1];
    const o = document.getElementById('kdvO_'+n).value;
    const t = document.getElementById('kdvT_'+n).value;
    const v = document.getElementById('kdvV_'+n).value;
    if (t!=='' || v!=='') sonuc.push({ oran:+o, satis_toplam:+t||0, kdv_tutar:+v||0 });
  });
  return sonuc;
}

function personelSonKayit(){
  const el = document.getElementById('gsSonKayit'); if(!el) return;
  let s; try{ s = JSON.parse(localStorage.getItem('sonGunSonu')||'null'); }catch(e){ s=null; }

  el.innerHTML = `<div class="kart" style="border-color:var(--uyari)">

async function gunSonuKaydet(){
  const kart = +document.getElementById('gsKart').value||0;
  const nakit = +document.getElementById('gsNakit').value||0;
  const toplam = +(kart + nakit).toFixed(2);
  const kdv = kdvOku();
  if (toplam === 0){ mesaj('gsMsg','hata','Kart ve nakit boş — genel toplam 0 olamaz.'); return; }
  if (kdv.length === 0 &&
      !confirm('KDV dökümü BOŞ. Z raporundaki VERGİ DÖKÜMÜ girilmedi — KDV tahmini bu gün için eksik kalır. Yine de kaydedilsin mi?')) return;
  // AKIL KONTROLLERİ (KÜM. TOPLAM tuzağı + KDV tutarlılığı)
  const kdvSatisToplami = kdv.reduce((a,x)=>a+x.satis_toplam,0);
  if (kdvSatisToplami > toplam*1.5 + 100){
    alert(`HATALI GİRİŞ OLABİLİR: KDV dökümündeki satış toplamı (${tl(kdvSatisToplami)}) günün cirosundan (${tl(toplam)}) çok büyük.\n\nZ kağıdındaki "KÜM. TOPLAM" satırını yazmış olabilirsiniz — o satır kasanın TÜM GEÇMİŞ toplamıdır, kullanılmaz.\n\n"%10 TOPLAM" gibi GÜNLÜK satırı girin.`);
    return;
  }
  for (const x of kdv){
    const beklenen = x.satis_toplam - x.satis_toplam/(1 + x.oran/100);
    if (x.satis_toplam > 0 && Math.abs(x.kdv_tutar - beklenen) > Math.max(5, beklenen*0.15) &&
        !confirm(`KDV kontrolü: %${x.oran} için ${tl(x.satis_toplam)} satışın KDV'si yaklaşık ${tl(beklenen)} olmalı, siz ${tl(x.kdv_tutar)} girdiniz.\nZ kağıdındaki TOPKDV satırıyla karşılaştırın. Yine de kaydedilsin mi?`)) return;
  }
  const kasa = +document.getElementById('gsKasa').value||0;
  if (kasa === 0 &&
      !confirm('Kasadaki Para girilmedi (kasa sayımı yapılmadı mı?). Boş kaydedilirse o günün gerçek nakit takibi eksik kalır. Yine de kaydedilsin mi?')) return;
  const btn = document.getElementById('gsKaydet');
  btn.disabled = true; btn.textContent = 'Fotoğraflar yükleniyor...';
  let zFoto=null, slipFoto=null;
  try{
    zFoto = await fotoYukle('gsZFoto','z');
    slipFoto = await fotoYukle('gsSlipFoto','slip');
  }catch(e){ mesaj('gsMsg','hata', e.message); btn.disabled=false; btn.textContent='Gün Sonunu Kaydet'; return; }
  const data = await rpcCagir('rpc_gun_sonu_kaydet', {
    p_idem: idem(), p_sube: PROFIL.sube_id, p_tarih: document.getElementById('gsTarih').value,
    p_kart: kart, p_nakit: nakit, p_toplam: toplam,
    p_iptal_adet: 0, p_iptal_tutar: 0,
    p_z_no: document.getElementById('gsZNo').value.trim()||null,
    p_kdv: kdv, p_z_foto: zFoto, p_slip_foto: slipFoto,
    p_not: document.getElementById('gsNot').value.trim()||null,
    p_kasa: kasa > 0 ? kasa : null
  }, 'gsKaydet','gsMsg','Gün sonu kaydedildi ✓');
  if (data && data.ok){
    try{ localStorage.setItem('sonGunSonu', JSON.stringify({ id:data.gun_sonu_id, tarih:document.getElementById('gsTarih').value, zaman:Date.now() })); }catch(e){}
    vGunSonu(); mesaj('gsMsg','ok','Gün sonu kaydedildi ✓');
  }
}
async function gunSonuListe(){
  const { data } = await sb.from('gun_sonu').select('*').eq('is_deleted',false)
    .order('tarih',{ascending:false}).limit(14);
  const gunler = data||[];
  // Kasadan ödenen giderler: sayım o kadar eksik çıkar, gerçek ciroya geri eklenir
  const kasadanMap = {};
  if (gunler.length){
    const ilkT = gunler[gunler.length-1].tarih;
    const [kg, no] = await Promise.all([
      sb.from('gider').select('tarih,tutar').eq('kasadan',true).eq('is_deleted',false).gte('tarih', ilkT),
      sb.from('tedarikci_odeme').select('tarih,tutar').eq('yontem','nakit').eq('is_deleted',false).gte('tarih', ilkT)
    ]);
    [...(kg.data||[]), ...(no.data||[])].forEach(x=>{ kasadanMap[x.tarih] = (kasadanMap[x.tarih]||0) + (+x.tutar); });
  }
  const el = document.getElementById('gsListe'); if(!el) return;
  el.innerHTML = `<div class="kart"><div class="kbaslik">Son Günler</div>
    ${gunler.length===0?'<div class="bilgi-not">Kayıt yok.</div>':gunler.map(g=>{
      const kasa = g.kasa_nakit===null ? null : +g.kasa_nakit;
      const kasadan = kasadanMap[g.tarih]||0;
      const gercek = kasa===null ? null : +g.kart_toplam + kasa + kasadan;
      const fark = kasa===null ? null : kasa + kasadan - g.nakit_toplam;
      return `
      <div class="liste-satir">
        <div class="l-sol"><div class="b">${new Date(g.tarih+'T00:00').toLocaleDateString('tr-TR')} ${g.kilitli?'🔒':'🔓'}</div>
          <div class="k">Kart ${tl(g.kart_toplam)} · Z nakit ${tl(g.nakit_toplam)} · Z:${esc(g.z_no||'—')}
          ${gercek!==null?`<br>Gerçek: <b>${tl(gercek)}</b> · Z-dışı nakit: <b>${fark>=0?'+':''}${tl(fark)}</b>${kasadan>0?' · kasadan ödenen: '+tl(kasadan):''}`:''}
          ${g.notlar?'<br>'+esc(g.notlar):''}</div></div>
        <div class="l-sag">${tl(g.toplam)}<br>
          <button class="btn-kirmizi" style="margin-top:4px" onclick="gunSil('${g.id}','${g.tarih}')">Sil & Yeniden Gir</button></div>
      </div>`;}).join('')}</div>`;
}
async function gunSil(id, tarih){
  const neden = prompt(`${tarih} günü SİLİNECEK (kayıt audit'te kalır) ve yeniden girilebilir olacak. Neden?`);
  if (neden===null) return;
  if (!neden.trim()){ alert('Neden yazmak zorunlu.'); return; }
  const { error } = await sb.rpc('rpc_gun_sonu_sil', { p_id:id, p_neden:neden.trim() });
  if (error){ alert('Silinemedi: '+hataTr(error.message)); return; }
  try{ localStorage.removeItem('sonGunSonu'); }catch(e){}
  vGunSonu();
}

async function sayimKaydet(urunler){
  const degisenler = [];
  for (const u of urunler){
    const inp = document.getElementById('sy_'+u.id);
    if (!inp || inp.value === '') continue;
    const fark = (+inp.value) - u.mevcut;
    if (Math.abs(fark) > 0.0001) degisenler.push({ urun:u.id, fark });
  }
  if (degisenler.length === 0){ mesaj('syMsg','hata','Hiç sayım girilmedi (veya hepsi sistemle aynı).'); return; }
  const data = await rpcCagir('rpc_sayim_toplu', {
    p_idem: idem(), p_sube: PROFIL.sube_id, p_tarih: bugun(),
    p_kalemler: degisenler.map(d=>({ urun:d.urun, fark:d.fark }))
  }, 'syKaydet','syMsg', `Sayım tamam: ${degisenler.length} ürün güncellendi ✓`);
  if (data && data.ok) setTimeout(vStok, 1200);
}
async function stokHareketKaydet(){
  let miktar = +document.getElementById('shMiktar').value||0;
  const tur = document.getElementById('shTur').value;
  if (miktar===0){ mesaj('shMsg','hata','Miktar boş olamaz.'); return; }
  if (tur==='tuketim' && miktar>0) miktar = -miktar;
  const data = await rpcCagir('rpc_stok_hareket_kaydet',{
    p_idem: idem(), p_sube: PROFIL.sube_id,
    p_urun: document.getElementById('shUrun').value,
    p_tarih: document.getElementById('shTarih').value,
    p_tur: tur, p_miktar: miktar,
    p_not: document.getElementById('shNot').value.trim()||null
  },'shKaydet','shMsg','Hareket kaydedildi ✓');
  if (data && data.ok) vStok();
}

let PG_DONEM = null;
// Asgari ücret yasal SGK yükü: net (hesaba yatan) → brüt = net/0,85 (asgari ücret GV+damga istisnası)
// → işveren SGK yükü = brüt × 0,375 (işçi payı %15 + işveren primi %22,5). Teşvikliyse elle düşürülür.
function sgkHesapla(net){ return net>0 ? +((net/0.85)*0.375).toFixed(2) : 0; }
async function vPersonel(){
  const el = document.getElementById('icerik');
  if (PROFIL.rol !== 'owner'){ el.innerHTML = '<div class="bilgi-not">Bu ekran yöneticiye özeldir.</div>'; return; }
  const donem = PG_DONEM || bugun().slice(0,7);
  PG_DONEM = donem;
  const { data } = await sb.from('personel_gider').select('*').eq('donem', donem)
    .eq('is_deleted', false).order('personel_adi');
  const kayitlar = data||[];
  const T = {maas:0,sgk:0,prim:0,yemek:0,maliyet:0};
  kayitlar.forEach(p=>{ const mal=(+p.maas)+(+p.sgk)+(+p.prim)+(+p.yemek);
    T.maas+=+p.maas; T.sgk+=+p.sgk; T.prim+=+p.prim; T.yemek+=+p.yemek; T.maliyet+=mal; });
  const satir = (ad, maas, sgk, prim, yemek, maliyet, silId, kalin) =>
    `<tr style="${kalin?'font-weight:800;background:var(--acik)':''}">
      <td style="padding:8px 6px;text-align:left">${ad}</td>
      <td style="padding:8px 6px;text-align:right">${tl(maas)}</td>
      <td style="padding:8px 6px;text-align:right;color:var(--soluk)">${tl(sgk)}</td>
      <td style="padding:8px 6px;text-align:right">${tl(prim)}</td>
      <td style="padding:8px 6px;text-align:right">${tl(yemek)}</td>
      <td style="padding:8px 6px;text-align:right;color:var(--ana);font-weight:800">${tl(maliyet)}</td>
      <td style="padding:8px 2px;text-align:center">${silId?`<button class="btn-kirmizi" style="padding:4px 8px" onclick="pgSil('${silId}','${ad}')">✕</button>`:''}</td>
    </tr>`;
  el.innerHTML = `
    <h2 class="bolum">Personel Giderleri</h2>
    <div class="kart">
      <label>Dönem</label>
      <input type="month" id="pgDonem" value="${donem}" onchange="PG_DONEM=this.value; vPersonel()">
      ${kayitlar.length===0 ? `<div class="bilgi-not">Bu ay kayıt yok.
        <button class="btn2" style="margin-left:8px" onclick="pgOncekiAydanKopyala()">Önceki aydan kopyala</button></div>` : `
      <div style="overflow-x:auto;margin-top:10px">
        <table style="width:100%;border-collapse:collapse;font-size:13px;min-width:520px">
          <thead><tr style="border-bottom:2px solid var(--cizgi);font-size:11px;color:var(--soluk)">
            <th style="padding:6px;text-align:left">PERSONEL</th>
            <th style="padding:6px;text-align:right">MAAŞ (yatan)</th>
            <th style="padding:6px;text-align:right">SGK</th>
            <th style="padding:6px;text-align:right">PRİM</th>
            <th style="padding:6px;text-align:right">YEMEK</th>
            <th style="padding:6px;text-align:right">MALİYET</th>
            <th></th>
          </tr></thead>
          <tbody>
            ${kayitlar.map(p=>satir(esc(p.personel_adi), p.maas, p.sgk, p.prim, p.yemek,
              (+p.maas)+(+p.sgk)+(+p.prim)+(+p.yemek), p.id)).join('')}
            ${satir('AY TOPLAMI', T.maas, T.sgk, T.prim, T.yemek, T.maliyet, null, true)}
          </tbody>
        </table>
      </div>`}
    </div>
    <div class="kart">
      <div class="kbaslik">Personel Satırı Ekle (${donem})</div>
      <label>Ad Soyad</label><input type="text" id="pgAd">
      <div class="satir">
        <div><label>Maaş (hesaba yatan / net)</label><input type="number" step="0.01" inputmode="decimal" id="pgMaas" placeholder="0,00"></div>
        <div><label>SGK (yasal — otomatik)</label><input type="number" step="0.01" inputmode="decimal" id="pgSgk" placeholder="otomatik"></div>
      </div>
      <div class="bilgi-not" style="margin:4px 0 0">Net maaşı yaz → SGK yasal olarak hesaplanır (asgari ücret: işçi+işveren toplam yükü). 5 puanlık teşvik alıyorsan SGK'yı elle düşür. Asgari ücret ÜSTÜ maaşta SGK'yı bordrodan elle yaz.</div>
      <div class="satir">
        <div><label>Prim</label><input type="number" step="0.01" inputmode="decimal" id="pgPrim" placeholder="0,00"></div>
        <div><label>Yemek</label><input type="number" step="0.01" inputmode="decimal" id="pgYemek" placeholder="0,00"></div>
      </div>
      <button class="btn" id="pgKaydet" onclick="pgEkle()">Satırı Ekle</button>
      <div class="hata-msg" id="pgMsg"></div>
    </div>`;
  document.getElementById('pgMaas').addEventListener('input', e=>{
    document.getElementById('pgSgk').value = sgkHesapla(+e.target.value||0) || '';
  });
}
async function pgEkle(){
  const ad = document.getElementById('pgAd').value.trim();
  const maas = +document.getElementById('pgMaas').value||0;
  if (!ad){ mesaj('pgMsg','hata','Ad boş olamaz.'); return; }
  if (maas===0 && !confirm('Maaş 0 girildi — emin misiniz?')) return;
  const { error } = await sb.from('personel_gider').insert({
    sube_id: PROFIL.sube_id, donem: PG_DONEM, personel_adi: ad,
    maas, sgk: +document.getElementById('pgSgk').value||0,
    prim: +document.getElementById('pgPrim').value||0,
    yemek: +document.getElementById('pgYemek').value||0,
    avans: 0
  });
  if (error){ mesaj('pgMsg','hata',error.message); return; }
  vPersonel();
}
async function pgSil(id, ad){
  if (!confirm(ad + ' bu aydan çıkarılsın mı? (kayıt silinmez, arşivde kalır)')) return;
  const { error } = await sb.from('personel_gider').update({ is_deleted:true }).eq('id', id);
  if (error){ alert('Çıkarılamadı: '+error.message); return; }
  vPersonel();
}
async function pgOncekiAydanKopyala(){
  const [y, a] = PG_DONEM.split('-').map(Number);
  const onceki = a===1 ? (y-1)+'-12' : y+'-'+String(a-1).padStart(2,'0');
  const { data } = await sb.from('personel_gider').select('*').eq('donem', onceki).eq('is_deleted', false);
  if (!data || data.length===0){ alert('Önceki ayda ('+onceki+') kayıt yok.'); return; }
  for (const p of data){
    await sb.from('personel_gider').insert({
      sube_id: p.sube_id, donem: PG_DONEM, personel_adi: p.personel_adi,
      maas: p.maas, sgk: p.sgk, prim: p.prim, yemek: p.yemek, avans: 0
    });
  }
  vPersonel();
}

async function vergiVadeYukle(){
  const el = document.getElementById('vergiVadeler'); if(!el) return;
  const { data } = await sb.from('vade').select('*').eq('is_deleted',false).order('vade_tarihi');
  const bugunT = bugun();
  el.innerHTML = (data||[]).length===0 ? '<div class="bilgi-not">Vade kaydı yok.</div>' : (data||[]).map(v=>{
    const odendi = v.odendi_gider_id !== null;
    const gecti = !odendi && v.vade_tarihi < bugunT;
    const yakin = !odendi && !gecti && v.vade_tarihi <= new Date(Date.now()+7*864e5).toISOString().slice(0,10);
    return `<div class="liste-satir">
      <div class="l-sol"><div class="b">${esc(v.aciklama)} ${gecti?'<span class="rozet rz-hata">GEÇTİ</span>':yakin?'<span class="rozet rz-uyari">YAKLAŞTI</span>':''}</div>
        <div class="k">${new Date(v.vade_tarihi+'T00:00').toLocaleDateString('tr-TR')}${v.tutar?' · '+tl(v.tutar):''}</div></div>
      <div class="l-sag">${odendi?'<span class="rozet rz-ok">Ödendi</span>':`<button class="btn2" onclick="vadeOdendi('${v.id}')">Ödendi</button>`}</div>
    </div>`;
  }).join('');
}
async function vadeOdendi(id){

/* ---- Banka POS Mutabakatı (PDF parse) ---- */
function bankaMutabakatKart(){
  const el = document.getElementById('bankaMutabakatKart'); if(!el) return;
  el.innerHTML = `
    <div class="kart">
      <div class="kbaslik">Banka POS Mutabakatı</div>
      <div class="bilgi-not" style="margin:0 0 8px">Bankanın aylık "Üye İşyeri Hesap Özeti" PDF'ini yükle — sistem toplam satış, komisyon, ÖKC ve net hesaba geçişi okuyup senin kart cironla karşılaştırır.</div>
      <label>Dönem</label><input type="month" id="bmDonem" value="${bugun().slice(0,7)}">
      <label>Banka PDF'i</label><input type="file" id="bmPdf" accept="application/pdf">
      <button class="btn" id="bmAnaliz" onclick="bankaPdfAnaliz()">PDF'i Analiz Et</button>
      <div class="hata-msg" id="bmMsg"></div>
      <div id="bmSonuc"></div>
    </div>`;
}
function trSayi(s){ // "1.658.776,00" → 1658776.00 ; "-24.688,65" → -24688.65
  if (s==null) return null;
  const m = String(s).replace(/[^\d.,-]/g,'').replace(/\./g,'').replace(',','.');
  const n = parseFloat(m); return isNaN(n) ? null : n;
}
async function bankaPdfAnaliz(){
  const inp = document.getElementById('bmPdf');
  if (!inp.files || !inp.files[0]){ mesaj('bmMsg','hata','PDF seçilmedi.'); return; }
  const btn = document.getElementById('bmAnaliz'); btn.disabled=true; btn.textContent='Okunuyor...';
  try{
    const buf = await inp.files[0].arrayBuffer();
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js';
    const pdf = await pdfjsLib.getDocument({data:buf}).promise;
    let metin = '';
    for (let i=1; i<=pdf.numPages; i++){
      const pg = await pdf.getPage(i);
      const tc = await pg.getTextContent();
      metin += tc.items.map(x=>x.str).join(' ') + '\n';
    }
    const bul = (etiket) => {
      const re = new RegExp(etiket.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + '[^\\d-]*(-?[\\d.]+,\\d{2})');
      const m = metin.match(re); return m ? trSayi(m[1]) : null;
    };
    const veri = {
      toplam_satis: bul('Toplam Satış'),
      komisyon: bul('İşyeri Ücreti Pşn\\(Tutar\\)'),
      maxipuan: bul('Maxipuan Katkı Payı'),
      okc_ucret: bul('ÖKC\\)') || bul('Bakım Ücreti'),
      kesinti_toplam: bul('Kesintiler Toplamı'),
      net_hesaba_gecis: bul('Dönem İçi Toplam Hesaba') || bul('Dönem İçi Peşin Hesaba'),
      bekleyen_alacak: bul('Toplam Alacak Tutarı')
    };
    if (veri.toplam_satis === null){ mesaj('bmMsg','hata','PDF tanınamadı — bu İş Bankası üye işyeri özeti mi? Alanlar okunamadı.'); btn.disabled=false; btn.textContent="PDF'i Analiz Et"; return; }
    // O ayın kart cirosu ile karşılaştır
    const donem = document.getElementById('bmDonem').value;
    const { data: gs } = await sb.from('gun_sonu').select('kart_toplam').gte('tarih',donem+'-01').lte('tarih',donem+'-31').eq('is_deleted',false);
    const bizimKart = (gs||[]).reduce((a,x)=>a+ +x.kart_toplam,0);
    const fark = veri.toplam_satis - bizimKart;
    const uyumlu = Math.abs(fark) < 1;
    document.getElementById('bmSonuc').innerHTML = `
      <div style="margin-top:12px">
        <div class="liste-satir"><div>Banka toplam satış</div><div class="l-sag">${tl(veri.toplam_satis)}</div></div>
        <div class="liste-satir"><div>Bizim kart cirosu (${(gs||[]).length} gün)</div><div class="l-sag">${tl(bizimKart)}</div></div>
        <div class="liste-satir"><div style="font-weight:800">FARK</div><div class="l-sag" style="color:${uyumlu?'var(--ok)':'var(--hata)'}">${uyumlu?'✓ Tutuyor':tl(fark)}</div></div>
        <div class="liste-satir"><div>Komisyon</div><div class="l-sag">${tl(veri.komisyon||0)}</div></div>
        <div class="liste-satir"><div>ÖKC/bakım ücreti</div><div class="l-sag">${tl(veri.okc_ucret||0)}</div></div>
        <div class="liste-satir"><div>Kesinti toplamı</div><div class="l-sag">${tl(veri.kesinti_toplam||0)}</div></div>
        <div class="liste-satir"><div>Net hesaba geçiş</div><div class="l-sag">${tl(veri.net_hesaba_gecis||0)}</div></div>
        <div class="liste-satir"><div>Bekleyen alacak</div><div class="l-sag">${tl(veri.bekleyen_alacak||0)}</div></div>
      </div>
      <button class="btn" onclick='bankaMutabakatKaydet(${JSON.stringify(veri).replace(/'/g,"&#39;")}, "${donem}", ${uyumlu})'>Mutabakatı Kaydet</button>`;
    mesaj('bmMsg','ok','PDF okundu — kontrol edip kaydedin.');
  }catch(e){
    mesaj('bmMsg','hata','PDF okunamadı: '+e.message);
  }finally{
    btn.disabled=false; btn.textContent="PDF'i Analiz Et";
  }
}
async function bankaMutabakatKaydet(veri, donem, uyumlu){
  const kesinti = (veri.komisyon||0)+(veri.maxipuan||0)+(veri.okc_ucret||0);
  const { error } = await sb.from('banka_mutabakat').insert({
    sube_id: PROFIL.sube_id, donem, toplam_satis: veri.toplam_satis,
    komisyon: veri.komisyon, maxipuan: veri.maxipuan, okc_ucret: veri.okc_ucret,
    kesinti_toplam: veri.kesinti_toplam, net_hesaba_gecis: veri.net_hesaba_gecis,
    bekleyen_alacak: veri.bekleyen_alacak, durum: uyumlu?'uyumlu':'farkli'
  });
  if (error){ alert('Kaydedilemedi: '+error.message); return; }
  // Komisyon + ÖKC otomatik gider olarak yazılsın mı
  if (confirm('Komisyon + ÖKC ücretini bu ayın gideri olarak da kaydedeyim mi? ('+tl(Math.abs((veri.komisyon||0)+(veri.okc_ucret||0)))+')')){
    const kat = KATALOG.kategoriler.find(k=>k.ad==='POS Komisyon') || KATALOG.kategoriler.find(k=>k.ad==='Diğer');
    if (kat){
      await sb.rpc('rpc_gider_kaydet',{ p_idem:idem(), p_sube:PROFIL.sube_id, p_tarih:donem+'-28',
        p_kategori:kat.id, p_aciklama:'Banka komisyon+ÖKC ('+donem+')', p_tutar:Math.abs((veri.komisyon||0)+(veri.okc_ucret||0)),
        p_kdv_orani:null, p_kdv_tutar:0, p_foto:null, p_kasadan:false, p_tedarikci:null });
    }
  }
  mesaj('bmMsg','ok','Mutabakat kaydedildi ✓');
}

      <div class="l-sag">${tl(v.tutar)}</div>

async function ayKapat(){

async function ayAc(){

  if (error){ mesaj('akMsg','hata', hataTr(error.message)); return; }

async function akDurumGoster(){
  const el = document.getElementById('akDurum'); if(!el) return;
  const donem = document.getElementById('akDonem').value;
  const { data } = await sb.from('ay_kapanis').select('kapali,eksik_gun_sayisi').eq('sube_id', PROFIL.sube_id).eq('donem', donem).eq('is_deleted',false).maybeSingle();
  el.innerHTML = data && data.kapali
    ? `<div class="rozet rz-hata" style="margin-top:8px">🔒 ${donem} KAPALI${data.eksik_gun_sayisi>0?' · '+data.eksik_gun_sayisi+' eksik gün':''}</div>`
    : `<div class="rozet rz-ok" style="margin-top:8px">🔓 ${donem} açık</div>`;
}
function trDuz(s){ // jsPDF standart fontu Türkçe karakter basamıyor — güvenli çevrim
  return String(s||'').replace(/ğ/g,'g').replace(/Ğ/g,'G').replace(/ü/g,'u').replace(/Ü/g,'U')
    .replace(/ş/g,'s').replace(/Ş/g,'S').replace(/ı/g,'i').replace(/İ/g,'I')
    .replace(/ö/g,'o').replace(/Ö/g,'O').replace(/ç/g,'c').replace(/Ç/g,'C');
}
async function arsivPdf(){
  const ayS = document.getElementById('arsivAy').value;
  if (!ayS){ mesaj('arsivMsg','hata','Ay seçilmedi.'); return; }
  const btn = document.getElementById('arsivBtn');
  btn.disabled = true; btn.textContent = 'Belgeler toplanıyor...';
  try{
    const bas = ayS + '-01', son = ayS + '-31';
    const [gs, al, gd] = await Promise.all([
      sb.from('gun_sonu').select('tarih,z_no,z_foto_path,pos_slip_foto_path').gte('tarih',bas).lte('tarih',son).eq('is_deleted',false).order('tarih'),
      sb.from('alis').select('tarih,toplam,foto_path,tedarikci(ad)').gte('tarih',bas).lte('tarih',son).eq('is_deleted',false).order('tarih'),
      sb.from('gider').select('tarih,tutar,foto_path,gider_kategori(ad)').gte('tarih',bas).lte('tarih',son).eq('is_deleted',false).order('tarih')
    ]);
    const ogeler = [];
    for (const g of (gs.data||[])){
      if (g.z_foto_path) ogeler.push({ b:`Z RAPORU — ${g.tarih}${g.z_no?' — Z No: '+g.z_no:''}`, p:g.z_foto_path });
      if (g.pos_slip_foto_path) ogeler.push({ b:`POS SLIP — ${g.tarih}`, p:g.pos_slip_foto_path });
    }
    for (const a of (al.data||[])) if (a.foto_path)
      ogeler.push({ b:`ALIS — ${a.tarih} — ${a.tedarikci?.ad||''} — ${tl(a.toplam)}`, p:a.foto_path });
    for (const x of (gd.data||[])) if (x.foto_path)
      ogeler.push({ b:`GIDER — ${x.tarih} — ${x.gider_kategori?.ad||''} — ${tl(x.tutar)}`, p:x.foto_path });
    if (ogeler.length === 0){ mesaj('arsivMsg','hata','Bu ayda fotoğraflı belge yok.'); return; }

    const pdf = new window.jspdf.jsPDF({ unit:'mm', format:'a4' });
    let ilk = true, eklenen = 0;
    for (let i = 0; i < ogeler.length; i++){
      btn.textContent = `Hazırlanıyor ${i+1}/${ogeler.length}...`;
      const { data: dosya, error } = await sb.storage.from('belgeler').download(ogeler[i].p);
      if (error || !dosya) continue;
      const url = URL.createObjectURL(dosya);
      const img = await new Promise(r=>{ const im=new Image(); im.onload=()=>r(im); im.onerror=()=>r(null); im.src=url; });
      if (img){
        if (!ilk) pdf.addPage();
        ilk = false; eklenen++;
        pdf.setFontSize(11); pdf.text(trDuz(ogeler[i].b), 10, 12);
        const enOran = Math.min(190/img.width, 265/img.height);
        pdf.addImage(img, ogeler[i].p.endsWith('.png')?'PNG':'JPEG', 10, 18,
          Math.round(img.width*enOran), Math.round(img.height*enOran));
      }
      URL.revokeObjectURL(url);
    }
    if (eklenen === 0){ mesaj('arsivMsg','hata','Belgeler indirilemedi.'); return; }
    pdf.save(`bardaks-arsiv-${ayS}.pdf`);
    mesaj('arsivMsg','ok', eklenen + ' belge tek PDF olarak indirildi ✓');
  }catch(e){
    mesaj('arsivMsg','hata','PDF oluşturulamadı: ' + e.message);
  }finally{
    btn.disabled = false; btn.textContent = 'PDF Oluştur ve İndir';
  }
}
